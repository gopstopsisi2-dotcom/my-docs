name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          pip install mkdocs mkdocs-material

      - name: Collect documentation metrics
  run: |
    pip install docstr-coverage
    python scripts/collect_metrics.py

- name: Comment metrics on PR
  uses: actions/github-script@v7
  with:
    script: |
      const fs = require('fs');
      const metrics = JSON.parse(fs.readFileSync('docs-quality-metrics.json', 'utf8'));
      const comment = `## Метрики качества документации
      
      | Показатель | Значение |
      |------------|----------|
      | Markdown страниц | ${metrics.md_pages} |
      | AsciiDoc страниц | ${metrics.adoc_pages} |
      | TODO в коде | ${metrics.todo_count} |
      | FIXME в коде | ${metrics.fixme_count} |
      | Покрытие комментариями | ${metrics.code_metrics.comment_percentage}% |
      
      *Отчет сгенерирован ${metrics.timestamp}*`;
      
      github.rest.issues.createComment({
        issue_number: context.issue.number,
        owner: context.repo.owner,
        repo: context.repo.repo,
        body: comment
      });
- name: Install Node.js tools
        run: |
          npm install -g markdownlint-cli
          npm install -g markdown-link-check
          npm install -g cspell
          npm install -g @stoplight/spectral-cli
          npm install -g swagger-cli

      - name: Lint Markdown files
        run: markdownlint docs/**/*.md README.md --config .markdownlint.json
        continue-on-error: false

      - name: Check spelling
        run: cspell docs/**/*.md README.md --config .cspell.json
        continue-on-error: false

      - name: Check broken links
        run: |
          find docs -name "*.md" -exec markdown-link-check {} \;
        continue-on-error: false

      - name: Validate OpenAPI spec
        run: swagger-cli validate api/openapi.yaml
        continue-on-error: false

      - name: Lint OpenAPI spec with Spectral
        run: spectral lint api/openapi.yaml
        continue-on-error: false

      - name: Build MkDocs site
        run: mkdocs build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 7